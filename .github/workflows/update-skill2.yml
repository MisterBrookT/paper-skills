name: Update skill2 submodule

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-skill2
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          submodules: true
          persist-credentials: false

      - name: Update skill2
        id: update
        shell: bash
        run: |
          git submodule update --remote --init skill2

          if git diff --quiet -- skill2; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "old=$(git ls-tree HEAD skill2 | awk '{print $3}')" >> "$GITHUB_OUTPUT"
          echo "new=$(git -C skill2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create update pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: automation/update-skill2
          delete-branch: true
          add-paths: skill2
          commit-message: Update skill2
          title: Update skill2
          body: |
            Automated skill2 submodule update.

            - Previous: `${{ steps.update.outputs.old }}`
            - Current: `${{ steps.update.outputs.new }}`
